###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, C, killactive,
bind = $mainMod SHIFT, Y, exec, pkill waybar && waybar &
bind = $mainMod, M, exit,
bind = $mainMod, Y, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, RETURN, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
#bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, Q, exec, $powermenu
bind = $mainMod, ESCAPE, exec, $lock
bind = $mainMod, B, exec, $browser
bind = $mainMod, T, exec, mpv $HOME/Videos/trening.webm

# bindd = $mainMod, G, FGRP, exec, $webapp="https://fgrp.net/" 



# Toggle fullscreen and floating mode
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, togglefloating, active
bind = $mainMod ALT, F, setfloating, active
bind = $mainMod ALT, F, resizeactive, exact 199% 98%
bind = $mainMod ALT, F, moveactive, exact 1930 20

# Switch focus to monitor with W = first monitor, E = second and R = third
bind = $mainMod, W, focusmonitor, $monitorLeft 
bind = $mainMod, E, focusmonitor, $monitorRight
bind = $mainMod, R, focusmonitor, $monitorBuiltin

# Move current workspace to monitor with W = first monitor, E = second and R = third
bind = $mainMod SHIFT, W, swapactiveworkspaces, current $monitorLeft
bind = $mainMod SHIFT, W, focusmonitor, $monitorLeft
bind = $mainMod SHIFT, E, swapactiveworkspaces, current $monitorRight
bind = $mainMod SHIFT, E, focusmonitor, $monitorRight
bind = $mainMod SHIFT, R, swapactiveworkspaces, current $monitorBuiltin
bind = $mainMod SHIFT, R, focusmonitor, $monitorBuiltin

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move window with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Resize window with mainMod + ALT + arrow keys
binde = $mainMod ALT, H, resizeactive, -10 0
binde = $mainMod ALT, L, resizeactive, 10 0
binde = $mainMod ALT, K, resizeactive, 0 -10
binde = $mainMod ALT, J, resizeactive, 0 10

# Switch focusworkspaceoncurrentmonitors with mainMod + [0-9]
bind = $mainMod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mainMod, 6, focusworkspaceoncurrentmonitor, 6
bind = $mainMod, 7, focusworkspaceoncurrentmonitor, 7
bind = $mainMod, 8, focusworkspaceoncurrentmonitor, 8
bind = $mainMod, 9, focusworkspaceoncurrentmonitor, 9
bind = $mainMod, 0, focusworkspaceoncurrentmonitor, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = ,XF86AudioPlay, exec, playerctl play-pause    
bindl = ,XF86AudioPrev, exec, playerctl previous    
bindl = ,XF86AudioNext, exec, playerctl next

bindl = , Print, exec, grim -g "$(slurp)" - | swappy -f -


